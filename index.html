<!DOCTYPE html>
<html>
<head>
  <title>Financial Reality Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 30px;
    }

    h1 {
      font-size: 32px;
    }

    p {
      color: #94a3b8;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      max-width: 400px;
      margin: auto;
      margin-top: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #3b82f6;
      color: white;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #2563eb;
    }

    .result {
      margin-top: 20px;
      text-align: left;
      background: #020617;
      padding: 15px;
      border-radius: 10px;
    }

    strong {
      color: #38bdf8;
    }
  </style>
</head>

<body>

<h1>Financial Reality Calculator</h1>
<p>Not what you earn — what you actually keep</p>

<div class="box">

  <input type="number" placeholder="Hourly Rate ($)" id="rate">
  <input type="number" placeholder="Hours per Week" id="hours">
  <input type="number" placeholder="Tax % (estimate)" id="tax">
  <input type="number" placeholder="Monthly Expenses (optional)" id="expenses">

  <button onclick="calc()">Calculate</button>

  <div class="result" id="output"></div>

</div>

<script>
function calc() {

  let rate = parseFloat(document.getElementById("rate").value) || 0;
  let hours = parseFloat(document.getElementById("hours").value) || 0;
  let tax = (parseFloat(document.getElementById("tax").value) || 0) / 100;
  let expenses = parseFloat(document.getElementById("expenses").value) || 0;

  let weekly = rate * hours;
  let yearly = weekly * 52;
  let monthly = yearly / 12;

  let afterTaxYear = yearly * (1 - tax);
  let afterTaxMonth = monthly * (1 - tax);
  let afterTaxWeek = weekly * (1 - tax);

  let afterExpenses = afterTaxMonth - expenses;

  let realHourly = (afterTaxYear / (hours * 52)) || 0;

  let lost = yearly - afterTaxYear;
  let lostPercent = (lost / yearly) * 100 || 0;

  let monthsLost = (lost / yearly) * 12 || 0;

  document.getElementById("output").innerHTML = `
    <strong>Yearly (After Tax):</strong> $${afterTaxYear.toFixed(2)}<br><br>

    <strong>Monthly Take Home:</strong> $${afterTaxMonth.toFixed(2)}<br>
    <strong>Weekly Take Home:</strong> $${afterTaxWeek.toFixed(2)}<br><br>

    <strong>Real Hourly Rate:</strong> $${realHourly.toFixed(2)} / hr<br><br>

    <strong>After Expenses (Monthly):</strong> $${afterExpenses.toFixed(2)}<br><br>

    <strong>Total Lost to Taxes:</strong> $${lost.toFixed(2)} (${lostPercent.toFixed(1)}%)<br><br>

    <strong>Time Lost Per Year:</strong> ${monthsLost.toFixed(1)} months
  `;
}
</script>

</body>
</html>
